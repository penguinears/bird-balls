<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bird Balls</title>

<style>
body{margin:0;overflow:hidden;background:linear-gradient(#87CEEB,#cfefff)}
canvas{display:block}

#ui{
position:fixed;
top:8px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:34px;
font-weight:bold;
}

#deathScreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}
</style>
</head>

<body>

<div id="ui">0</div>

<div id="deathScreen">
<h1>U DIED LOL</h1>
<button onclick="restart()">Retry</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
addEventListener('resize',resize);

/* ========= CORE ========= */
let score=0;
let gravity=0.4;
let charge=0;

const player={
  x:220,
  y:0,
  vx:0,
  vy:0,
  size:130,
  onGround:false
};

let platforms=[];

/* ========= PLATFORMS ========= */
function createPlatforms(){
  platforms=[];
  let x=0;

  for(let i=0;i<50;i++){
    let w=260+Math.random()*120;
    let gap=180+Math.random()*180;
    let y=canvas.height-260-Math.random()*120;

    platforms.push({x,y,w});
    x+=w+gap;
  }

  player.y=platforms[0].y-player.size/2;
  player.onGround=true;
}
createPlatforms();

/* ========= DRAW ========= */
function drawPlatforms(){
  platforms.forEach(p=>{
    ctx.fillStyle='#3c8d2f';
    ctx.fillRect(p.x,p.y,p.w,canvas.height);

    ctx.fillStyle='#2e6b23';
    ctx.fillRect(p.x,p.y,p.w,12);
  });
}

function drawPlayer(){
  ctx.fillStyle='white';
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.size/2,0,Math.PI*2);
  ctx.fill();
}

function drawWater(){
  let base=canvas.height-40;

  ctx.fillStyle='#1e88e5';
  ctx.fillRect(0,base,canvas.width,40);
}

/* ========= UPDATE ========= */
function update(){

  // physics
  if(!player.onGround){
    player.vy+=gravity;
    if(player.vy>18)player.vy=18; // terminal velocity

    player.x+=player.vx;
    player.y+=player.vy;
  }

  player.onGround=false;

  /* ===== FIXED COLLISION ===== */
  platforms.forEach(p=>{
    const left=p.x;
    const right=p.x+p.w;

    const prevY=player.y-player.vy;
    const prevFeet=prevY+player.size/2;
    const currFeet=player.y+player.size/2;

    if(player.x+player.size*0.3>left && player.x-player.size*0.3<right){

      if(prevFeet<=p.y && currFeet>=p.y){
        player.y=p.y-player.size/2;
        player.vy=0;
        player.vx*=0.6;
        player.onGround=true;

        score+=5;
      }
    }
  });

  // camera
  if(player.x>canvas.width*0.3){
    let d=player.x-canvas.width*0.3;
    player.x=canvas.width*0.3;
    platforms.forEach(p=>p.x-=d);
  }

  // death
  if(player.y>canvas.height-20){
    document.getElementById('deathScreen').style.display='flex';
  }

  document.getElementById('ui').textContent=score;
}

/* ========= DRAW LOOP ========= */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPlatforms();
  drawPlayer();
  drawWater();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

/* ========= CONTROLS ========= */
document.addEventListener('keydown',e=>{
  if(e.code==='Space' && player.onGround){
    player.vy=-14-charge*0.3;
    player.vx=4+charge*0.2;
    player.onGround=false;
    charge=0;
  }

  if(e.code==='ArrowDown') charge+=1;
});

/* ========= RESTART ========= */
function restart(){
  score=0;
  createPlatforms();

  player.x=220;
  player.vx=0;
  player.vy=0;

  document.getElementById('deathScreen').style.display='none';
}
</script>

</body>
</html>
