<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bird Balls</title>

<link rel="icon" type="image/png" href="images/1000043615-removebg-preview.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  body { margin:0; font-family: Arial; background:linear-gradient(#87CEEB,#cfefff); overflow:hidden; }
  canvas { display:block; }

  #ui {
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:40px;
    font-weight:bold;
    text-shadow:0 3px 6px rgba(0,0,0,0.5);
  }

  /* FULL SCREEN DEATH SCREEN */
  #deathScreen {
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
  }

  #deathScreen img {
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    top:0;
    left:0;
    opacity:0.7;
  }

  #deathScreen h1 {
    position:relative;
    color:red;
    font-size:70px;
    font-weight:bold;
    margin-bottom:20px;
    text-shadow:0 0 20px black;
  }

  #deathScreen button {
    position:relative;
    padding:20px 40px;
    font-size:30px;
    border:4px solid rgb(30,48,80);
    border-radius:16px;
    background:white;
    color:black;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
  }

  #controls {
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:30px;
  }

  .ctrlBtn {
    padding:20px 30px;
    font-size:26px;
    border:4px solid rgb(30,48,80);
    border-radius:16px;
    background:white;
    color:black;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    user-select:none;
  }

  #respawnBtn {
    position:fixed;
    top:10px;
    left:10px;
    padding:12px 18px;
    font-size:20px;
    border:3px solid rgb(30,48,80);
    border-radius:12px;
    background:white;
    color:black;
    box-shadow:0 3px 8px rgba(0,0,0,0.3);
    user-select:none;
  }
</style>
</head>

<body>

<div id="ui">0</div>

<button id="respawnBtn">↻</button>

<div id="deathScreen">
  <img src="images/chick.webp">
  <h1>U DIED LOL</h1>
  <button onclick="restart()">Retry</button>
</div>

<div id="controls">
  <button id="downBtn" class="ctrlBtn">
    <i class="fa-solid fa-arrow-down" style="color: rgb(30, 48, 80);"></i>
  </button>

  <button id="upBtn" class="ctrlBtn">
    <i class="fa-solid fa-arrow-up" style="color: rgb(30, 48, 80);"></i>
  </button>

  <button id="releaseBtn" class="ctrlBtn">RELEASE</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let score = 0;
let gravity = 0.6;

let charge = 0;
let maxCharge = 80;
let targetSquish = 0;
let currentSquish = 0; // elastic squish

let holdingDown = false;
let holdingUp = false;

const img = new Image();
img.src = 'images/1000043615-removebg-preview.png';

const player = {
  x: 200,
  y: canvas.height - 500,
  vx: 0,
  vy: 0,
  size: 150,
  onGround: true
};

let worldX = player.x;

let platforms = [];

function createPlatforms() {
  platforms = [];
  let x = 0;
  for (let i = 0; i < 40; i++) {
    let width = 220 + Math.random()*120;
    let gap = 220 + Math.random()*220;
    let heightOffset = Math.random()*140;

    platforms.push({
      x: x,
      y: canvas.height - 300 - heightOffset,
      w: width,
      h: canvas.height
    });

    x += width + gap;
  }
}

createPlatforms();

/* DRAW PLAYER WITH ELASTIC SQUISH */
function drawPlayer() {
  currentSquish += (targetSquish - currentSquish) * 0.25;

  let topHeight = player.size * 0.55;
  let bottomHeight = player.size * 0.45;

  let squishedBottom = bottomHeight - currentSquish;
  if (squishedBottom < 10) squishedBottom = 10;

  let topShift = (bottomHeight - squishedBottom);

  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.scale(-1, 1);

  ctx.drawImage(
    img,
    0, 0, img.width, img.height * 0.55,
    -player.size/2, -player.size/2 + topShift,
    player.size, topHeight
  );

  ctx.drawImage(
    img,
    0, img.height * 0.55, img.width, img.height * 0.45,
    -player.size/2,
    -player.size/2 + topHeight + topShift,
    player.size,
    squishedBottom
  );

  ctx.restore();
}

function drawPlatforms() {
  platforms.forEach(p => {
    ctx.fillStyle = '#3c8d2f';
    ctx.fillRect(p.x, p.y, p.w, p.h);

    ctx.fillStyle = '#2e6b23';
    ctx.fillRect(p.x, p.y, p.w, 12);
  });
}

function update() {
  if (!player.onGround) {
    player.vy += gravity;
    player.x += player.vx;
    worldX += player.vx;
    player.y += player.vy;
  }

  player.onGround = false;

  // predictive collision
  platforms.forEach(p => {
    if (player.x > p.x && player.x < p.x + p.w) {
      let feet = player.y + player.size/2;
      let nextFeet = feet + player.vy;

      if (feet <= p.y && nextFeet >= p.y) {
        player.y = p.y - player.size/2;
        player.vy = 0;
        player.vx *= 0.55;
        player.onGround = true;
      }
    }
  });

  // camera follow
  if (player.x > canvas.width * 0.35) {
    let diff = player.x - canvas.width * 0.35;
    player.x = canvas.width * 0.35;
    platforms.forEach(p => p.x -= diff);
  }

  // score based on world distance
  score = Math.max(score, Math.floor(worldX / 160));
  document.getElementById('ui').innerText = score;

  if (player.y > canvas.height + 250) {
    document.getElementById('deathScreen').style.display = 'flex';
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPlatforms();
  drawPlayer();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

/* MANUAL SQUISH CONTROL (ELASTIC, MORE POWERFUL) */
function pressDown() {
  if (player.onGround) {
    targetSquish += 4;
    charge += 3;
    if (targetSquish > 70) targetSquish = 70;
    if (charge > maxCharge) charge = maxCharge;
  }
}

function pressUp() {
  if (player.onGround) {
    targetSquish -= 3;
    charge -= 2;
    if (targetSquish < 0) targetSquish = 0;
    if (charge < 0) charge = 0;
  }
}

/* RELEASE JUMP (STRONGER ARC) */
function releaseJump() {
  if (player.onGround && charge > 0) {
    player.vy = -12 - charge * 0.35;
    player.vx = 3.0 + charge * 0.18;
    player.onGround = false;
    targetSquish = 0;
    charge = 0;
  }
}

/* HOLD LOGIC */
function handleHeldButtons() {
  if (holdingDown) pressDown();
  if (holdingUp) pressUp();
  requestAnimationFrame(handleHeldButtons);
}
handleHeldButtons();

/* BUTTON EVENTS */
const downBtn = document.getElementById('downBtn');
const upBtn = document.getElementById('upBtn');
const releaseBtn = document.getElementById('releaseBtn');

downBtn.addEventListener('mousedown', () => holdingDown = true);
downBtn.addEventListener('mouseup', () => holdingDown = false);
downBtn.addEventListener('mouseleave', () => holdingDown = false);
downBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); holdingDown = true; });
downBtn.addEventListener('touchend', ()=> holdingDown = false);

upBtn.addEventListener('mousedown', () => holdingUp = true);
upBtn.addEventListener('mouseup', () => holdingUp = false);
upBtn.addEventListener('mouseleave', () => holdingUp = false);
upBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); holdingUp = true; });
upBtn.addEventListener('touchend', ()=> holdingUp = false);

releaseBtn.addEventListener('mousedown', releaseJump);
releaseBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); releaseJump(); });

/* RESPAWN */
document.getElementById('respawnBtn').addEventListener('click', ()=> {
  restart();
  document.getElementById('deathScreen').style.display = 'none';
});

function restart(){
  score = 0;
  player.x = 200;
  player.y = canvas.height - 500;
  player.vx = 0;
  player.vy = 0;
  worldX = player.x;
  targetSquish = 0;
  currentSquish = 0;
  charge = 0;
  createPlatforms();
  document.getElementById('deathScreen').style.display = 'none';
}
</script>

</body>
</html>
