<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bird Balls</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="images/1000043615-removebg-preview.png">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  body { margin:0; font-family: Arial; background:linear-gradient(#87CEEB,#cfefff); overflow:hidden; }
  canvas { display:block; }

  #ui {
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:40px;
    font-weight:bold;
    text-shadow:0 3px 6px rgba(0,0,0,0.5);
  }

  #deathScreen {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.85);
    padding:20px;
    border-radius:20px;
    text-align:center;
    display:none;
  }

  #deathScreen img {
    width:200px;
    margin-bottom:10px;
  }

  #deathScreen h1 {
    color:red;
    font-size:48px;
    margin:0;
    margin-bottom:10px;
    font-weight:bold;
  }

  #controls {
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:30px;
  }

  .ctrlBtn {
    padding:20px 30px;
    font-size:26px;
    border:4px solid rgb(30,48,80);
    border-radius:16px;
    background:white;
    color:black;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    user-select:none;
  }

  #respawnBtn {
    position:fixed;
    top:10px;
    left:10px;
    padding:12px 18px;
    font-size:20px;
    border:3px solid rgb(30,48,80);
    border-radius:12px;
    background:white;
    color:black;
    box-shadow:0 3px 8px rgba(0,0,0,0.3);
    user-select:none;
  }
</style>
</head>

<body>

<div id="ui">0</div>

<button id="respawnBtn">↻</button>

<div id="deathScreen">
  <img src="images/chick.webp">
  <h1>U DIED LOL</h1>
  <button class="ctrlBtn" onclick="restart()">Retry</button>
</div>

<div id="controls">
  <button id="downBtn" class="ctrlBtn">
    <i class="fa-solid fa-arrow-down" style="color: rgb(30, 48, 80);"></i>
  </button>

  <button id="releaseBtn" class="ctrlBtn">RELEASE</button>

  <button id="cancelBtn" class="ctrlBtn">
    <i class="fa-solid fa-xmark" style="color: rgb(30, 48, 80);"></i>
  </button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let score = 0;
let gravity = 0.6;
let charging = false;
let charge = 0;
let maxCharge = 60;

const img = new Image();
img.src = 'images/1000043615-removebg-preview.png';

const player = {
  x: 200,
  y: canvas.height - 500,
  vx: 0,
  vy: 0,
  size: 150,
  onGround: true
};

let platforms = [];

function createPlatforms() {
  platforms = [];
  let x = 0;
  for (let i = 0; i < 40; i++) {
    let width = 220 + Math.random()*120;
    let gap = 220 + Math.random()*220;
    let heightOffset = Math.random()*140;

    platforms.push({
      x: x,
      y: canvas.height - 300 - heightOffset,
      w: width,
      h: canvas.height
    });

    x += width + gap;
  }
}

createPlatforms();

// squish
function drawPlayer() {
  let squish = charging ? Math.min(charge * 0.7, 40) : 0;

  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.scale(-1, 1);

  let topHeight = player.size * 0.55;
  let bottomHeight = player.size * 0.45;

  let squishedBottom = bottomHeight - squish;
  if (squishedBottom < 10) squishedBottom = 10;

  let topShift = (bottomHeight - squishedBottom);

  ctx.drawImage(
    img,
    0, 0, img.width, img.height * 0.55,
    -player.size/2, -player.size/2 + topShift,
    player.size, topHeight
  );

  ctx.drawImage(
    img,
    0, img.height * 0.55, img.width, img.height * 0.45,
    -player.size/2,
    -player.size/2 + topHeight + topShift,
    player.size,
    squishedBottom
  );

  ctx.restore();
}

function drawPlatforms() {
  platforms.forEach(p => {
    ctx.fillStyle = '#3c8d2f';
    ctx.fillRect(p.x, p.y, p.w, p.h);

    ctx.fillStyle = '#2e6b23';
    ctx.fillRect(p.x, p.y, p.w, 12);
  });
}

function update() {
  if (!player.onGround) {
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;
  }

  player.onGround = false;

  platforms.forEach(p => {
    if (player.x > p.x && player.x < p.x + p.w) {
      if (player.y + player.size/2 > p.y && player.y + player.size/2 < p.y + 45 && player.vy >= 0) {
        player.y = p.y - player.size/2;
        player.vy = 0;
        player.vx *= 0.55;
        player.onGround = true;
      }
    }
  });

  if (player.x > canvas.width * 0.35) {
    let diff = player.x - canvas.width * 0.35;
    player.x = canvas.width * 0.35;
    platforms.forEach(p => p.x -= diff);
  }

  score = Math.max(score, Math.floor(player.x / 160));
  document.getElementById('ui').innerText = score;

  if (player.y > canvas.height + 250) {
    document.getElementById('deathScreen').style.display = 'block';
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPlatforms();
  drawPlayer();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// charge
function startCharge(){
  if(player.onGround){
    charging = true;
    charge = 0;
  }
}

// release
function releaseJump(){
  if(charging){
    charging = false;

    let c = Math.min(charge, maxCharge);

    player.vy = -10 - c * 0.22;
    player.vx = 2.5 + c * 0.12;

    player.onGround = false;
  }
}

// unspring
function cancelCharge() {
  charging = false;
  charge = 0;
}

// buttons
document.getElementById('downBtn').addEventListener('mousedown', startCharge);
document.getElementById('downBtn').addEventListener('touchstart', (e)=>{ e.preventDefault(); startCharge(); });

document.getElementById('releaseBtn').addEventListener('mouseup', releaseJump);
document.getElementById('releaseBtn').addEventListener('touchend', (e)=>{ e.preventDefault(); releaseJump(); });

document.getElementById('cancelBtn').addEventListener('mousedown', cancelCharge);
document.getElementById('cancelBtn').addEventListener('touchstart', (e)=>{ e.preventDefault(); cancelCharge(); });

function chargeLoop(){
  if(charging) charge += 0.7;
  requestAnimationFrame(chargeLoop);
}
chargeLoop();

// respawn
document.getElementById('respawnBtn').addEventListener('click', ()=> {
  restart();
  document.getElementById('deathScreen').style.display = 'none';
});

// restart
function restart(){
  score = 0;
  player.x = 200;
  player.y = canvas.height - 500;
  player.vx = 0;
  player.vy = 0;
  charging = false;
  charge = 0;
  createPlatforms();
  document.getElementById('deathScreen').style.display = 'none';
}
</script>

</body>
</html>
