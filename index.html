<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bird Balls</title>

<style>
  body { margin:0; font-family: Arial; background:linear-gradient(#87CEEB,#cfefff); overflow:hidden; }
  canvas { display:block; }

  #ui {
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:40px;
    font-weight:bold;
    text-shadow:0 3px 6px rgba(0,0,0,0.5);
  }

  #gameOver {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.8);
    color:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    display:none;
  }

  button {
    padding:20px 30px;
    font-size:28px;
    border:none;
    border-radius:18px;
    background:#3c8d2f;
    color:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.4);
    user-select:none;
  }

  #controls {
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:40px;
  }
</style>
</head>

<body>

<div id="ui">0</div>

<div id="gameOver">
  <h1>You Died</h1>
  <button onclick="restart()">Try Again</button>
</div>

<div id="controls">
  <button id="downBtn">⬇️</button>
  <button id="upBtn">⬆️</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let score = 0;
let gravity = 0.7;
let charging = false;
let charge = 0;

const img = new Image();
img.src = 'images/1000043615-removebg-preview.png';

const player = {
  x: 120,
  y: canvas.height - 250,
  vx: 0,
  vy: 0,
  size: 90,
  onGround: true
};

let platforms = [];

function createPlatforms() {
  platforms = [];
  let x = 0;
  for (let i = 0; i < 40; i++) {
    let width = 200 + Math.random()*100;
    let gap = 200 + Math.random()*200; // bigger gaps
    let heightOffset = Math.random()*150;

    platforms.push({
      x: x,
      y: canvas.height - 200 - heightOffset,
      w: width,
      h: canvas.height // goes all the way down
    });

    x += width + gap;
  }
}

createPlatforms();


// ---------------------------
// FIXED BOTTOM-HEAVY SQUISH
// ---------------------------
function drawPlayer() {
  let squish = charging ? Math.min(charge / 12, 30) : 0;

  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.scale(-1, 1);

  let topHeight = player.size * 0.55;
  let bottomHeight = player.size * 0.45;

  let squishedBottom = bottomHeight - squish;
  if (squishedBottom < 10) squishedBottom = 10;

  // Move top half down when bottom compresses
  let topShift = (bottomHeight - squishedBottom);

  // Top half
  ctx.drawImage(
    img,
    0, 0, img.width, img.height * 0.55,
    -player.size/2, -player.size/2 + topShift,
    player.size, topHeight
  );

  // Bottom half
  ctx.drawImage(
    img,
    0, img.height * 0.55, img.width, img.height * 0.45,
    -player.size/2,
    -player.size/2 + topHeight + topShift,
    player.size,
    squishedBottom
  );

  ctx.restore();
}


function drawPlatforms() {
  platforms.forEach(p => {
    ctx.fillStyle = '#3c8d2f';
    ctx.fillRect(p.x, p.y, p.w, p.h);

    ctx.fillStyle = '#2e6b23';
    ctx.fillRect(p.x, p.y, p.w, 10);
  });
}

function update() {
  if (!player.onGround) {
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;
  }

  player.onGround = false;

  platforms.forEach(p => {
    if (player.x > p.x && player.x < p.x + p.w) {
      if (player.y + player.size/2 > p.y && player.y + player.size/2 < p.y + 40 && player.vy >= 0) {
        player.y = p.y - player.size/2;
        player.vy = 0;
        player.vx *= 0.5;
        player.onGround = true;
      }
    }
  });

  // camera follow
  if (player.x > canvas.width * 0.35) {
    let diff = player.x - canvas.width * 0.35;
    player.x = canvas.width * 0.35;
    platforms.forEach(p => p.x -= diff);
  }

  score = Math.max(score, Math.floor(player.x / 150));
  document.getElementById('ui').innerText = score;

  if (player.y > canvas.height + 200) {
    document.getElementById('gameOver').style.display = 'block';
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPlatforms();
  drawPlayer();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();


// ---------------------------
// CHARGE + JUMP (reduced power)
// ---------------------------
function startCharge(){
  if(player.onGround){
    charging = true;
    charge = 0;
  }
}

function releaseJump(){
  if(charging){
    charging = false;
    player.vy = -8 - charge*0.15;  // reduced power
    player.vx = 4 + charge*0.15;   // reduced power
    player.onGround = false;
  }
}


// ---------------------------
// BUTTON CONTROLS
// ---------------------------
document.getElementById('downBtn').addEventListener('mousedown', startCharge);
document.getElementById('downBtn').addEventListener('touchstart', (e)=>{ e.preventDefault(); startCharge(); });

document.getElementById('upBtn').addEventListener('mouseup', releaseJump);
document.getElementById('upBtn').addEventListener('touchend', (e)=>{ e.preventDefault(); releaseJump(); });


// charge loop
function chargeLoop(){
  if(charging) charge += 1;
  requestAnimationFrame(chargeLoop);
}
chargeLoop();


// restart
function restart(){
  score = 0;
  player.x = 120;
  player.y = canvas.height - 250;
  player.vx = 0;
  player.vy = 0;
  createPlatforms();
  document.getElementById('gameOver').style.display = 'none';
}
</script>

</body>
</html>
