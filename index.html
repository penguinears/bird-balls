<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird Balls</title>
<style>
  body { margin:0; font-family: Arial; background:#87CEEB; overflow:hidden; }
  canvas { display:block; }
  #ui {
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:24px;
    font-weight:bold;
    text-shadow:0 2px 4px rgba(0,0,0,0.5);
  }
  #gameOver {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.7);
    color:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    display:none;
  }
  button {
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
  }
</style>
</head>
<body>
<div id="ui">Score: 0</div>
<div id="gameOver">
  <h1>You Died</h1>
  <button onclick="restart()">Try Again</button>
</div>
<canvas id="game"></canvas><script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gravity = 0.6;
let charging = false;
let charge = 0;

const img = new Image();
img.src = 'images/1000043615-removebg-preview.png';

const player = {
  x: 150,
  y: canvas.height - 150,
  vx: 0,
  vy: 0,
  size: 60,
  onGround: true
};

let platforms = [];

function createPlatforms() {
  platforms = [];
  let x = 0;
  for (let i = 0; i < 20; i++) {
    let width = 120;
    platforms.push({
      x: x,
      y: canvas.height - 80,
      w: width,
      h: 20
    });
    x += width + Math.random() * 150;
  }
}

createPlatforms();

function drawPlayer() {
  let squish = charging ? Math.min(charge / 20, 20) : 0;

  ctx.save();
  ctx.translate(player.x, player.y);

  // Flip image horizontally
  ctx.scale(-1, 1);

  ctx.drawImage(img, -player.size/2, -player.size/2 + squish, player.size, player.size - squish);
  ctx.restore();
}

function drawPlatforms() {
  ctx.fillStyle = '#654321';
  platforms.forEach(p => {
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });
}

function update() {
  if (!player.onGround) {
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;
  }

  player.onGround = false;

  platforms.forEach(p => {
    if (player.x > p.x && player.x < p.x + p.w) {
      if (player.y + player.size/2 > p.y && player.y + player.size/2 < p.y + 20 && player.vy >= 0) {
        player.y = p.y - player.size/2;
        player.vy = 0;
        player.vx = 0;
        player.onGround = true;
      }
    }
  });

  // camera scroll
  if (player.x > canvas.width / 2) {
    let diff = player.x - canvas.width / 2;
    player.x = canvas.width / 2;
    platforms.forEach(p => p.x -= diff);
  }

  // score update
  score = Math.max(score, Math.floor(player.x / 100));
  document.getElementById('ui').innerText = 'Score: ' + score;

  // death
  if (player.y > canvas.height + 100) {
    document.getElementById('gameOver').style.display = 'block';
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPlatforms();
  drawPlayer();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

// controls
window.addEventListener('mousedown', () => {
  if (player.onGround) {
    charging = true;
    charge = 0;
  }
});

window.addEventListener('mouseup', () => {
  if (charging) {
    charging = false;

    player.vy = -10 - charge * 0.2;
    player.vx = 5 + charge * 0.2;
    player.onGround = false;
  }
});

function chargeLoop() {
  if (charging) charge += 1;
  requestAnimationFrame(chargeLoop);
}
chargeLoop();

function restart() {
  score = 0;
  player.x = 150;
  player.y = canvas.height - 150;
  player.vx = 0;
  player.vy = 0;
  createPlatforms();
  document.getElementById('gameOver').style.display = 'none';
}
</script></body>
</html>
