<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Bird Balls</title>

<style>
body{margin:0;overflow:hidden;background:linear-gradient(#87CEEB,#cfefff);touch-action:none}
canvas{display:block}

#ui{
position:fixed;top:10px;left:50%;transform:translateX(-50%);
color:white;font-size:32px;font-weight:bold;z-index:5
}

#controls{
position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
display:flex;gap:14px;z-index:5
}

.ctrlBtn{
padding:12px 18px;font-size:18px;
border:3px solid #1e3050;border-radius:12px;
background:white;color:black
}

#deathScreen{
position:fixed;top:0;left:0;width:100vw;height:100vh;
display:none;justify-content:center;align-items:center;
flex-direction:column;background:black;z-index:20
}

#deathScreen img{
position:absolute;width:100%;height:100%;
object-fit:cover;opacity:.7
}

#deathScreen h1{
color:red;font-size:60px;z-index:2;margin-bottom:20px
}

#deathScreen button{
padding:16px 32px;font-size:24px;
border-radius:16px;border:4px solid #1e3050;
background:white;z-index:2
}
</style>
</head>
<body>

<div id="ui">0</div>

<div id="deathScreen">
<img src="images/chick.webp">
<h1>LOL YOU DIED</h1>
<button onclick="restart()">Play Again</button>
</div>

<div id="controls">
<button id="downBtn" class="ctrlBtn">↓</button>
<button id="upBtn" class="ctrlBtn">↑</button>
<button id="releaseBtn" class="ctrlBtn">RELEASE</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();addEventListener('resize',resize);

// sounds
const sndLaunch=new Audio('sounds/humordome-boing-boing-bounce-454474.mp3');
const sndLand=new Audio('sounds/playzz-thud-491559 (1).mp3');

// bird
const img=new Image();
img.src='images/1000043615-removebg-preview.png';

// state
let score=0;
let charge=0;
let holdingDown=false;
let holdingUp=false;
let dead=false;
let lastPlatform=-1;

// player
const player={
x:200,
y:200,
vx:0,
vy:0,
size:100,
onGround:true
};

// platforms (HARDER)
let platforms=[];
function createPlatforms(){
platforms=[];
let x=0;
for(let i=0;i<50;i++){
let w=180+Math.random()*80;
let gap=260+Math.random()*200; // BIGGER gaps
let y=canvas.height*0.6 + (Math.random()-0.5)*180; // more height variation
platforms.push({x,y,w,id:i});
x+=w+gap;
}
player.x=platforms[0].x+100;
player.y=platforms[0].y-player.size/2;
player.vx=0;
player.vy=0;
player.onGround=true;
lastPlatform=-1;
}
createPlatforms();

// water
function drawWater(){
ctx.fillStyle="#1e88e5";
ctx.fillRect(0,canvas.height-40,canvas.width,40);
}

// update
function update(){
if(dead)return;

if(!player.onGround){
player.vy+=0.6;
}

player.x+=player.vx;
player.y+=player.vy;

let grounded=false;

for(let p of platforms){
if(player.x+player.size/2>p.x && player.x-player.size/2<p.x+p.w){
let feet=player.y+player.size/2;
let nextFeet=feet+player.vy;

if(player.vy>=0 && feet<=p.y && nextFeet>=p.y){
player.y=p.y-player.size/2;
player.vy=0;
player.vx*=0.7; // keep more speed
grounded=true;

// STOP launch sound + play land
sndLaunch.pause();
sndLaunch.currentTime=0;
sndLand.currentTime=0;
sndLand.play();

if(p.id!==lastPlatform){
score++;
lastPlatform=p.id;
}
}
}
}

player.onGround=grounded;

if(player.x>canvas.width*0.4){
let d=player.x-canvas.width*0.4;
player.x=canvas.width*0.4;
platforms.forEach(p=>p.x-=d);
}

if(player.y>canvas.height){
dead=true;
document.getElementById('deathScreen').style.display='flex';
}

document.getElementById('ui').textContent=score;
}

// draw
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

drawWater();

ctx.fillStyle="#3c8d2f";
for(let p of platforms){
ctx.fillRect(p.x,p.y,p.w,canvas.height-p.y);
}

// squash from bottom
ctx.save();
let feetY = player.y + player.size/2;
ctx.translate(player.x, feetY);
ctx.scale(-1,1);

let squash = 1 - charge*0.005;
if(squash < 0.5) squash = 0.5;

ctx.scale(1, squash);
ctx.drawImage(img,-player.size/2,-player.size,player.size,player.size);

ctx.restore();
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

// controls
function pressDown(){
if(player.onGround){
charge+=1;
if(charge>80)charge=80;
}
}

function pressUp(){
if(player.onGround){
charge-=2;
if(charge<0)charge=0;
}
}

function releaseJump(){
if(player.onGround){
sndLaunch.currentTime=0;
sndLaunch.play();

player.vy=-14-charge*0.45; // STRONGER jump
player.vx=5+charge*0.3;   // faster forward
player.onGround=false;
charge=0;
}
}

function holdLoop(){
if(holdingDown)pressDown();
if(holdingUp)pressUp();
requestAnimationFrame(holdLoop);
}
holdLoop();

downBtn.onmousedown=()=>holdingDown=true;
downBtn.onmouseup=()=>holdingDown=false;
downBtn.ontouchstart=e=>{e.preventDefault();holdingDown=true};
downBtn.ontouchend=()=>holdingDown=false;

upBtn.onmousedown=()=>holdingUp=true;
upBtn.onmouseup=()=>holdingUp=false;
upBtn.ontouchstart=e=>{e.preventDefault();holdingUp=true};
upBtn.ontouchend=()=>holdingUp=false;

releaseBtn.onclick=releaseJump;

function restart(){
score=0;
charge=0;
dead=false;
createPlatforms();
document.getElementById('deathScreen').style.display='none';
}
</script>
</body>
</html>
