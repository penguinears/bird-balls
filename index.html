<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bird Balls</title>
<link rel="icon" type="image/png" href="images/1000043615-removebg-preview.png">
<style>
  body { margin:0; font-family: Arial; background:linear-gradient(#87CEEB,#cfefff); overflow:hidden; }
  canvas { display:block; }

  #ui {
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:40px;
    font-weight:bold;
    text-shadow:0 3px 6px rgba(0,0,0,0.5);
  }

  #gameOver {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.85);
    color:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    display:none;
  }

  .btn {
    padding:20px 30px;
    font-size:28px;
    border:none;
    border-radius:18px;
    background:#444;
    color:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.4);
    user-select:none;
  }

  #controls {
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:40px;
  }

  #respawnBtn {
    position:fixed;
    top:10px;
    left:10px;
    padding:10px 16px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:#444;
    color:white;
    box-shadow:0 3px 8px rgba(0,0,0,0.4);
    user-select:none;
  }
</style>
</head>

<body>

<div id="ui">0</div>

<button id="respawnBtn">↻</button>

<div id="gameOver">
  <h1>You Died</h1>
  <button class="btn" onclick="restart()">Try Again</button>
</div>

<div id="controls">
  <button id="downBtn" class="btn">⬇️</button>
  <button id="upBtn" class="btn">RELEASE</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let score = 0;
let gravity = 0.6;
let charging = false;
let charge = 0;
let maxCharge = 45;

const img = new Image();
img.src = 'images/1000043615-removebg-preview.png';

const player = {
  x: 160,
  y: canvas.height - 260,
  vx: 0,
  vy: 0,
  size: 140,   // bigger bird
  onGround: true
};

let platforms = [];

function createPlatforms() {
  platforms = [];
  let x = 0;
  for (let i = 0; i < 40; i++) {
    let width = 220 + Math.random()*120;
    let gap = 220 + Math.random()*220;
    let heightOffset = Math.random()*140;

    platforms.push({
      x: x,
      y: canvas.height - 320 - heightOffset, // higher platforms
      w: width,
      h: canvas.height // goes to bottom
    });

    x += width + gap;
  }
}

createPlatforms();

// bottom-heavy squish with top moving down
function drawPlayer() {
  let squish = charging ? Math.min(charge * 0.6, 32) : 0;

  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.scale(-1, 1);

  let topHeight = player.size * 0.55;
  let bottomHeight = player.size * 0.45;

  let squishedBottom = bottomHeight - squish;
  if (squishedBottom < 12) squishedBottom = 12;

  let topShift = (bottomHeight - squishedBottom);

  // top half
  ctx.drawImage(
    img,
    0, 0, img.width, img.height * 0.55,
    -player.size/2, -player.size/2 + topShift,
    player.size, topHeight
  );

  // bottom half
  ctx.drawImage(
    img,
    0, img.height * 0.55, img.width, img.height * 0.45,
    -player.size/2,
    -player.size/2 + topHeight + topShift,
    player.size,
    squishedBottom
  );

  ctx.restore();
}

function drawPlatforms() {
  platforms.forEach(p => {
    // body
    ctx.fillStyle = '#555';
    ctx.fillRect(p.x, p.y, p.w, p.h);

    // top edge
    ctx.fillStyle = '#777';
    ctx.fillRect(p.x, p.y, p.w, 10);
  });
}

function update() {
  if (!player.onGround) {
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;
  }

  player.onGround = false;

  platforms.forEach(p => {
    if (player.x > p.x && player.x < p.x + p.w) {
      if (player.y + player.size/2 > p.y && player.y + player.size/2 < p.y + 45 && player.vy >= 0) {
        player.y = p.y - player.size/2;
        player.vy = 0;
        player.vx *= 0.55;
        player.onGround = true;
      }
    }
  });

  // camera follow
  if (player.x > canvas.width * 0.35) {
    let diff = player.x - canvas.width * 0.35;
    player.x = canvas.width * 0.35;
    platforms.forEach(p => p.x -= diff);
  }

  score = Math.max(score, Math.floor(player.x / 160));
  document.getElementById('ui').innerText = score;

  if (player.y > canvas.height + 250) {
    document.getElementById('gameOver').style.display = 'block';
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPlatforms();
  drawPlayer();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// charge + arc jump
function startCharge(){
  if(player.onGround){
    charging = true;
    charge = 0;
  }
}

function releaseJump(){
  if(charging){
    charging = false;

    let c = Math.min(charge, maxCharge);

    // arc jump: more up than across, but not too high
    player.vy = -9 - c * 0.18;  // vertical
    player.vx = 2.2 + c * 0.10; // horizontal

    player.onGround = false;
  }
}

// buttons
document.getElementById('downBtn').addEventListener('mousedown', startCharge);
document.getElementById('downBtn').addEventListener('touchstart', (e)=>{ e.preventDefault(); startCharge(); });

document.getElementById('upBtn').addEventListener('mouseup', releaseJump);
document.getElementById('upBtn').addEventListener('touchend', (e)=>{ e.preventDefault(); releaseJump(); });

// charge loop
function chargeLoop(){
  if(charging) charge += 0.7; // small increase per frame
  requestAnimationFrame(chargeLoop);
}
chargeLoop();

// respawn without needing to die
document.getElementById('respawnBtn').addEventListener('click', ()=> {
  restart();
  document.getElementById('gameOver').style.display = 'none';
});

// restart
function restart(){
  score = 0;
  player.x = 160;
  player.y = canvas.height - 260;
  player.vx = 0;
  player.vy = 0;
  charging = false;
  charge = 0;
  createPlatforms();
}
</script>

</body>
</html>
